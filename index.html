  <script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;

    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    const onMsg = e => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  React.useEffect(() => { if (open) clampToViewport(); }, [open, clampToViewport]);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = e => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = ev => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>;
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakButton });
  </script>

  if (!v || !v.trim()) return null;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? null : "Enter a valid email address";
};
const validatePhone = v => {
  if (!v || !v.trim()) return "Add a phone number so buyers can reach you";
  return v.replace(/\D/g,"").length < 9 ? "Phone must be at least 9 digits" : null;
};

    if (state.category) pct += 25;
    if (state.price) pct += 15;
    if (state.phone.replace(/\D/g,"").length >= 9) pct += 15;
    if (state.email && !validateEmail(state.email)) pct += 5;
    if (state.address) pct += 5;
    return Math.min(pct, 100);
  }, [state]);

  const handleCategoryTap = () => setField("category", { main:"Транспорт", sub:"Продажа авто", brand:"Toyota" });

  <!-- ─── app ──────────────────────────────────────────────────────── -->
  <script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "emailRequired": false,
  "emailPrefilled": true,
  "showEmailHint": true
}/*EDITMODE-END*/;

const PREFILLED_EMAIL = "user@gmail.com";

const App = () => {
  const [t, setT] = useTweaks(TWEAK_DEFAULTS);
  const [step, setStep] = React.useState(0);
  const [state, setState] = React.useState({
    photos:0, photoDescription:"", aiDetecting:false, aiDone:false,
    description:"", category:null, price:"", currency:"KGS",
    phone:"+996 123 456 789", hidePhone:false,
    email: PREFILLED_EMAIL, address:"Bishkek",
    budget:34, vip:false, publishOutcome:null, negotiable:false,
  });

  const lastPrefilledRef = React.useRef(t.emailPrefilled);
  React.useEffect(() => {
    if (t.emailPrefilled !== lastPrefilledRef.current) {
      lastPrefilledRef.current = t.emailPrefilled;
      setState(s => ({ ...s, email: t.emailPrefilled ? (s.email || PREFILLED_EMAIL) : (s.email === PREFILLED_EMAIL ? "" : s.email) }));
    }
  }, [t.emailPrefilled]);

  const goNext = outcome => {
    if (step === 2) setState(s => ({ ...s, publishOutcome: outcome || "paid" }));
    setStep(s => Math.min(s+1, 3));
  };
  const goBack = () => setStep(s => Math.max(s-1, 0));
  const restart = () => {
    setStep(0);
    setState({ photos:0, photoDescription:"", aiDetecting:false, aiDone:false, description:"", category:null, price:"", currency:"KGS", phone:"+996 123 456 789", hidePhone:false, email: t.emailPrefilled ? PREFILLED_EMAIL : "", address:"Bishkek", budget:34, vip:false, publishOutcome:null, negotiable:false });
  };

  const screen = (() => {
    switch(step) {
      case 0: return <StepPhotoDesc onNext={() => setStep(1)} onClose={restart} state={state} setState={setState} />;
      case 1: return <StepYourAd onNext={() => setStep(2)} onBack={goBack} state={state} setState={setState} tweaks={t} />;
      case 2: return <StepPromotion onNext={goNext} onBack={goBack} onClose={restart} state={state} setState={setState} />;
      case 3: return <StepSuccess onDone={restart} state={state} />;
      default: return null;
    }
  })();

  return (
    <div style={{ minHeight:"100vh", background:"#F0F2F7", display:"flex", alignItems:"center", justifyContent:"center", padding:"32px 16px", fontFamily:"'Ubuntu',sans-serif" }}>
      {/* iPhone frame */}
      <div style={{ width:390, height:844, borderRadius:48, overflow:"hidden", position:"relative", background:"#fff", boxShadow:"0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)" }}>
        {/* Dynamic island */}
        <div style={{ position:"absolute", top:11, left:"50%", transform:"translateX(-50%)", width:126, height:37, borderRadius:24, background:"#000", zIndex:50 }} />
        {/* Status bar */}
        <div style={{ position:"absolute", top:0, left:0, right:0, zIndex:10, height:50, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 32px 0", pointerEvents:"none" }}>
          <span style={{ fontFamily:"-apple-system,system-ui,sans-serif", fontSize:15, fontWeight:600, color:"#000" }}>9:41</span>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <svg width="16" height="11" viewBox="0 0 18 12" fill="#000"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
            <svg width="15" height="11" viewBox="0 0 15 11" fill="#000"><path d="M7.5 0a12 12 0 0 1 7.5 2.6l-1.5 1.5a10 10 0 0 0-12 0L0 2.6A12 12 0 0 1 7.5 0Zm0 4a8 8 0 0 1 4.7 1.6l-1.5 1.5a6 6 0 0 0-6.4 0L2.8 5.6A8 8 0 0 1 7.5 4Zm0 4a4 4 0 0 1 2.3 0.8l-2.3 2.3-2.3-2.3A4 4 0 0 1 7.5 8Z"/></svg>
            <div style={{ width:24, height:11, border:"1.2px solid #000", borderRadius:2.5, position:"relative", padding:1, display:"flex" }}>
              <div style={{ flex:1, background:"#000", borderRadius:1.5 }} />
              <div style={{ position:"absolute", right:-3, top:3, width:1.5, height:5, background:"rgba(0,0,0,0.4)", borderRadius:1 }} />
            </div>
          </div>
        </div>
        {/* App content */}
        <div style={{ paddingTop:47, height:"100%", display:"flex", flexDirection:"column", boxSizing:"border-box" }}>
          {screen}
        </div>
        {/* Home indicator */}
        <div style={{ position:"absolute", bottom:0, left:0, right:0, zIndex:60, height:34, display:"flex", justifyContent:"center", alignItems:"flex-end", paddingBottom:8, pointerEvents:"none" }}>
          <div style={{ width:139, height:5, borderRadius:100, background:"rgba(0,0,0,0.85)" }} />
        </div>
      </div>

      {/* Step indicator */}
      <div style={{ position:"fixed", top:16, left:16, padding:"8px 14px", background:"#fff", borderRadius:9999, boxShadow:"0 4px 15px rgba(10,19,49,0.12)", fontFamily:"'Ubuntu',sans-serif", fontSize:13, color:"#737D9B", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ color:"#0A1331", fontWeight:700 }}>Step {step+1}/4</span>
        <span>·</span>
        <span>{["Photo & description","Your ad","Promotion","Success"][step]}</span>
      </div>

      <TweaksPanel title="Email field tweaks">
        <TweakSection label="Email field">
          <TweakToggle label="Required" value={t.emailRequired} onChange={v => setT("emailRequired",v)} />
          <TweakToggle label="Prefill from profile" value={t.emailPrefilled} onChange={v => setT("emailPrefilled",v)} />
          <TweakToggle label="Show helper hint" value={t.showEmailHint} onChange={v => setT("showEmailHint",v)} />
        </TweakSection>
        <TweakSection label="Flow">
          <TweakButton label="Restart flow" onClick={restart} />
          <TweakButton label="Skip to form" onClick={() => setStep(1)} secondary />
          <TweakButton label="Skip to promotion" onClick={() => setStep(2)} secondary />
          <TweakButton label="Skip to success" onClick={() => { setState(s => ({ ...s, publishOutcome:"paid", budget:34 })); setStep(3); }} secondary />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
